<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>cairn playground — architecture diagrams as code</title>
<style>
  :root { --bg:#1e2227; --panel:#252a31; --border:#3a4149; --text:#d6dde4; --dim:#8b97a3; --err:#ff7b72; --warn:#e3b341; --ok:#7ee787; --accent:#6cb6ff; }
  * { box-sizing:border-box; }
  body { margin:0; height:100vh; display:flex; flex-direction:column; font-family:-apple-system,'Segoe UI',Roboto,sans-serif; background:var(--bg); color:var(--text); }
  header { display:flex; align-items:center; gap:12px; padding:8px 14px; background:var(--panel); border-bottom:1px solid var(--border); flex-wrap:wrap; }
  header h1 { font-size:15px; margin:0; font-weight:600; }
  header .dim { color:var(--dim); font-size:12px; }
  header select, header button { background:var(--bg); color:var(--text); border:1px solid var(--border); border-radius:6px; padding:5px 10px; font-size:12.5px; cursor:pointer; }
  header button:hover, header select:hover { border-color:var(--accent); }
  main { flex:1; display:flex; min-height:0; }
  .left { width:44%; min-width:320px; display:flex; flex-direction:column; border-right:1px solid var(--border); }
  #editor { flex:1; resize:none; border:0; outline:0; padding:12px 14px; background:var(--bg); color:var(--text); font:13px/1.55 ui-monospace,Menlo,Consolas,monospace; white-space:pre; tab-size:2; }
  #diags { max-height:32%; overflow:auto; border-top:1px solid var(--border); background:var(--panel); font:12px/1.5 ui-monospace,Menlo,Consolas,monospace; }
  #diags:empty { display:none; }
  .diag { padding:6px 14px; border-bottom:1px solid var(--border); cursor:pointer; }
  .diag:hover { background:var(--bg); }
  .diag b.e { color:var(--err); } .diag b.w { color:var(--warn); }
  .diag .help { color:var(--dim); display:block; }
  .right { flex:1; display:flex; flex-direction:column; min-width:0; }
  #preview { flex:1; overflow:auto; background:#ffffff; display:flex; align-items:flex-start; position:relative; }
  #preview svg { max-width:none; }
  #preview.stale svg { opacity:.45; transition:opacity .1s; }
  #preview.error { background:#fff5f5; }
  .err-panel { margin:auto; max-width:460px; padding:32px; text-align:center; }
  .err-panel .err-icon { font-size:52px; line-height:1; }
  .err-panel .err-h { margin-top:14px; font-size:19px; font-weight:700; color:#b3261e; }
  .err-panel .err-p { margin-top:8px; font-size:13.5px; line-height:1.6; color:#8a5a5a; }
  #status { padding:6px 14px; background:var(--panel); border-top:1px solid var(--border); font-size:12px; color:var(--dim); display:flex; gap:16px; align-items:center; }
  #status .ok { color:var(--ok); } #status .err { color:var(--err); }
  #zoom { margin-left:auto; display:flex; gap:6px; }
  #zoom button { background:var(--bg); color:var(--text); border:1px solid var(--border); border-radius:4px; width:26px; cursor:pointer; }
  .note { color:var(--dim); font-size:12px; }
</style>
</head>
<body>
<header>
  <h1>cairn <span class="dim">playground</span></h1>
  <select id="templates" title="Start from a template">
    <option value="">templates…</option>
    <option value="logical">logical — starter</option>
    <option value="application">application — starter</option>
    <option value="infrastructure">infrastructure — starter</option>
  </select>
  <button id="share">Copy share link</button>
  <button id="embed" title="A live SVG URL served by /api/svg — embed it in a README or docs">Copy embed URL</button>
  <button id="download">Download SVG</button>
  <span class="note" id="note"></span>
</header>
<main>
  <div class="left">
    <textarea id="editor" spellcheck="false"></textarea>
    <div id="diags"></div>
  </div>
  <div class="right">
    <div id="preview"></div>
    <div id="status"><span id="stat">loading engine…</span>
      <span id="zoom"><button data-z="0.75">−</button><button data-z="1">1×</button><button data-z="1.333">+</button></span>
    </div>
  </div>
</main>

<script type="module">
import { compile, version } from './cairn-engine.js';

// Minimal starter scaffolds — one per diagram type. Each is a clean base
// that compiles with zero errors so you can build up from it.
const TEMPLATES = {
logical: `diagram logical "My logical view"

actor-group ACTORS "Actors" {
  actor USER "User"
}

system SYS "My system" {
  block APP "Application"
}

USER -> APP : "Uses the service"
`,
application: `diagram application "My application view"

actor-group ACTORS "Actors" {
  actor USER "User"
}

application APP "My application" {
  module M1 "Main module"
}

datastore DB "Database"

USER -> M1 : "Request"
M1 -> DB : "Read / write" (JDBC)
`,
infrastructure: `diagram infrastructure "My infrastructure view"

site DC "Data center" {
  network-zone Z "Application zone" {
    server SRV "Server" {
      app-instance APP_I "Application"
    }
  }
}

external USER "User"

USER -> SRV : "Access" (HTTPS/443)
`};

const editor  = document.getElementById('editor');
const preview = document.getElementById('preview');
const diagsEl = document.getElementById('diags');
const stat    = document.getElementById('stat');
const note    = document.getElementById('note');
let lastSvg = null, zoom = 1;

const escapeHtml = s => s.replace(/&/g, '&amp;').replace(/</g, '&lt;');
const b64encode = s => btoa(String.fromCharCode(...new TextEncoder().encode(s)));
const b64decode = s => new TextDecoder().decode(Uint8Array.from(atob(s), c => c.charCodeAt(0)));

// --- Live render loop -------------------------------------------------------
// Serialised (never overlap the ELK worker) + latest-wins: while a compile is
// in flight, edits set `pending`; when it finishes we re-run against the newest
// text. When the DSL has errors we do NOT render the diagram — the preview
// switches to a clear error state and points at the error list below.
let running = false, pending = false;

function schedule() {
  preview.classList.add('stale');
  clearTimeout(schedule._t);
  schedule._t = setTimeout(run, 120);
}

async function run() {
  if (running) { pending = true; return; }
  running = true;
  const src = editor.value;
  try {
    const r = await compile(src);
    diagsEl.innerHTML = r.diagnostics.map(d =>
      `<div class="diag" data-line="${d.span.line}"><b class="${d.severity === 'error' ? 'e' : 'w'}">${d.severity}[${d.code}]</b> line ${d.span.line}: ${escapeHtml(d.message)}${d.help ? `<span class="help">help: ${escapeHtml(d.help)}</span>` : ''}</div>`
    ).join('');
    const ne = r.diagnostics.filter(d => d.severity === 'error').length;
    const nw = r.diagnostics.length - ne;
    if (r.svg) {
      lastSvg = r.svg;
      preview.classList.remove('error');
      preview.innerHTML = r.svg;
      applyZoom();
      stat.innerHTML = `<span class="ok">✓</span> ${r.metrics.width}×${r.metrics.height} · layout ${r.metrics.layoutMs} ms · label overlaps: ${r.metrics.overlaps}${nw ? ` · <span style="color:var(--warn)">${nw} warning${nw > 1 ? 's' : ''}</span>` : ''} · engine v${version}`;
    } else {
      // errors: do NOT render the diagram at all — clear it and show a clear
      // error state so it's unmistakable, pointing to the error list below.
      preview.classList.add('error');
      preview.innerHTML = `<div class="err-panel"><div class="err-icon">⚠</div>`
        + `<div class="err-h">${ne} error${ne > 1 ? 's' : ''} — diagram not rendered</div>`
        + `<div class="err-p">Fix the ${ne > 1 ? 'errors' : 'error'} listed below the editor and the diagram will render again automatically.</div></div>`;
      stat.innerHTML = `<span class="err">✗ ${ne} error${ne > 1 ? 's' : ''}</span> — fix them to render`;
    }
  } catch (e) {
    preview.classList.add('error');
    preview.innerHTML = `<div class="err-panel"><div class="err-icon">⚠</div>`
      + `<div class="err-h">Engine error — diagram not rendered</div>`
      + `<div class="err-p">${escapeHtml(e.message)}</div></div>`;
    stat.innerHTML = `<span class="err">engine error: ${escapeHtml(e.message)}</span>`;
  } finally {
    running = false;
    preview.classList.remove('stale');
    if (pending) { pending = false; run(); }   // re-render against the newest text
  }
}

editor.addEventListener('input', schedule);

diagsEl.addEventListener('click', e => {
  const line = e.target.closest('.diag')?.dataset.line;
  if (!line) return;
  const pos = editor.value.split('\n').slice(0, line - 1).join('\n').length + 1;
  editor.focus(); editor.setSelectionRange(pos, pos);
});

// --- Templates --------------------------------------------------------------
document.getElementById('templates').addEventListener('change', e => {
  const t = TEMPLATES[e.target.value];
  if (t) { editor.value = t; run(); }
  e.target.value = '';
});

// --- Share / embed / download ----------------------------------------------
function flash(msg) { note.textContent = msg; clearTimeout(flash._t); flash._t = setTimeout(() => note.textContent = '', 2200); }

document.getElementById('share').addEventListener('click', async () => {
  location.hash = 'src=' + b64encode(editor.value);
  await navigator.clipboard.writeText(location.href);
  flash('share link copied ✓');
});

document.getElementById('embed').addEventListener('click', async () => {
  const url = `${location.origin}/api/svg?s=${encodeURIComponent(b64encode(editor.value))}`;
  await navigator.clipboard.writeText(url);
  flash('embed URL copied ✓  (served by /api/svg)');
});

document.getElementById('download').addEventListener('click', () => {
  if (!lastSvg) return;
  const a = document.createElement('a');
  a.href = URL.createObjectURL(new Blob([lastSvg], { type: 'image/svg+xml' }));
  a.download = 'diagram.svg';
  a.click();
});

document.getElementById('zoom').addEventListener('click', e => {
  const z = e.target.dataset.z;
  if (!z) return;
  zoom = z === '1' ? 1 : Math.min(4, Math.max(0.2, zoom * parseFloat(z)));
  applyZoom();
});
function applyZoom() {
  const svg = preview.querySelector('svg');
  if (!svg || !svg.viewBox || !svg.viewBox.baseVal) return;
  const vb = svg.viewBox.baseVal;
  svg.style.width = (vb.width * zoom) + 'px';
  svg.style.height = (vb.height * zoom) + 'px';
}

// load: shared link > logical starter
const m = location.hash.match(/src=([^&]+)/);
editor.value = m ? b64decode(m[1]) : TEMPLATES.logical;
run();
</script>
</body>
</html>
