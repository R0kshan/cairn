# Deploys the playground to GitHub Pages on every push to main.
# The engine runs 100% client-side — static hosting is all it needs.
name: playground
on:
  push:
    branches: [main]

permissions:
  contents: read
  pages: write
  id-token: write

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with: { node-version: 22 }
      - run: npm ci
      - run: bash scripts/build-playground.sh   # esbuild via npx, no bun needed
      - uses: actions/upload-pages-artifact@v3
        with: { path: playground }
      - id: deployment
        uses: actions/deploy-pages@v4
