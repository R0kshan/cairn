# Blocks a PR that adds a dependency with a known vulnerability (or a
# disallowed license). Cairn has a single runtime dep (elkjs), so this mostly
# guards devDependencies and future additions.
name: dependency-review
on:
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  review:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7
        with: { persist-credentials: false }
      - uses: actions/dependency-review-action@a1d282b36b6f3519aa1f3fc636f609c47dddb294 # v5.0.0
        with:
          fail-on-severity: high
