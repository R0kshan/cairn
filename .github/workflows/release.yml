# Release automation
# on tag v* -> test -> compile binaries for 5 platforms -> attest provenance
# -> GitHub Release -> bump brew formula & scoop manifest in their repos.
# (No npm publish: the bare name "cairn" is taken on the registry; the curl /
#  Homebrew / Scoop channels ship the GitHub Release binaries and don't need it.
#  To add npm later, publish under a scoped name — e.g. "@<user>/cairn" — with an
#  NPM_TOKEN secret and a job mirroring `binaries`.)
#
# Security posture:
#  - all actions are pinned to a commit SHA (comment shows the human tag),
#  - least privilege: the default GITHUB_TOKEN is read-only; only the `binaries`
#    job is granted the writes it needs,
#  - checkouts don't persist credentials.
name: release
on:
  push:
    tags: ["v*"]

# Read-only by default; jobs opt into the narrow writes they need.
permissions:
  contents: read

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
        with: { persist-credentials: false }
      - uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020 # v7
        with: { node-version: 22, package-manager-cache: false }
      - run: npm ci
      - run: npm test

  binaries:
    needs: test
    runs-on: ubuntu-latest
    permissions:
      contents: write      # create the GitHub Release + upload assets
      id-token: write      # OIDC token for build-provenance attestation
      attestations: write  # write the attestation
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
        with: { persist-credentials: false }
      - uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6 # v2
        with: { no-cache: true }
      - run: bun install
      # Tag is the single source of truth for the release version — see
      # scripts/build-binaries.sh. Keeps binaries, checksums, and the
      # `taps` job's `dist/cairn-${VERSION}-checksums.txt` lookup in sync
      # even if package.json wasn't bumped before tagging.
      - run: VERSION="${GITHUB_REF_NAME#v}" bash scripts/build-binaries.sh

      # Don't ship a binary that can't run: smoke the just-built linux binary
      # (the runner can execute it) through the full pipeline before publishing.
      - run: bash scripts/smoke-binary.sh "dist/cairn-${GITHUB_REF_NAME#v}-linux-x64"

      # Cryptographic provenance: proves each binary was built by this workflow.
      # Verifiable with: gh attestation verify <binary> --repo R0kshan/cairn
      # NOTE: attest-build-provenance is pinned to its major tag below because its
      # commit SHA couldn't be resolved at authoring time. It's a first-party
      # (actions/*) action, the lowest-risk case; to fully pin it run:
      #   gh api repos/actions/attest-build-provenance/commits/v2 --jq .sha
      # and replace `@v2` with `@<sha> # v2`.
      - uses: actions/attest-build-provenance@0f67c3f4856b2e3261c31976d6725780e5e4c373 #v4.1.1
        with:
          subject-path: |
            dist/cairn-*
            !dist/*.txt

      - uses: softprops/action-gh-release@1c214ab373197cfdedb8c44482a8faf4608192d7 # v3.0.2
        with:
          files: |
            dist/cairn-*
          generate_release_notes: true

      # Hand the built binaries + checksums to the taps job.
      - uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: dist
          path: dist/

  taps:
    needs: binaries
    runs-on: ubuntu-latest
    # Only reads this repo; pushes go to the tap/bucket repos via PUSH_TOKEN.
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
        with: { persist-credentials: false }
      - uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020 # v7
        with: { node-version: 22, package-manager-cache: false }
      - uses: actions/download-artifact@fa0a91b85d4f404e444e00e005971372dc801d16 # v4.1.8
        with: { name: dist, path: dist }

      - name: Render formula + manifest
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          node scripts/render-packaging.mjs "$VERSION" "dist/cairn-${VERSION}-checksums.txt"

      # Push the rendered formula to the Homebrew tap repo (R0kshan/homebrew-tap).
      - name: Publish Homebrew formula
        env:
          PUSH_TOKEN: ${{ secrets.PUSH_TOKEN }}
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          git clone "https://x-access-token:${PUSH_TOKEN}@github.com/R0kshan/homebrew-tap.git" tap
          mkdir -p tap/Formula
          cp dist/cairn.rb tap/Formula/cairn.rb
          cd tap
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add Formula/cairn.rb
          git commit -m "cairn ${VERSION}" || { echo "no change"; exit 0; }
          git push

      # Push the rendered manifest to the Scoop bucket repo (R0kshan/scoop-bucket).
      - name: Publish Scoop manifest
        env:
          PUSH_TOKEN: ${{ secrets.PUSH_TOKEN }}
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          git clone "https://x-access-token:${PUSH_TOKEN}@github.com/R0kshan/scoop-bucket.git" bucket
          mkdir -p bucket/bucket
          cp dist/cairn.json bucket/bucket/cairn.json
          cd bucket
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add bucket/cairn.json
          git commit -m "cairn ${VERSION}" || { echo "no change"; exit 0; }
          git push
