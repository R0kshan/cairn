name: ci
on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
        with: { persist-credentials: false }
      - uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020 # v7
        with: { node-version: 22 }
      - run: npm ci
      # `npm test` includes the non-regression snapshot gate (tests/snapshot.test.ts):
      # canary renders are diffed against committed snapshots. An intended change is
      # acknowledged with `npm run snapshots` + commit; otherwise this step fails.
      - run: npm test
      # regression gate: every example must build with zero label overlaps
      - run: |
          for f in examples/*.cairn examples/dispositions/*.cairn; do
            case "$f" in *broken*) continue;; esac
            out=$(node --experimental-strip-types src/cli.ts build "$f" 2>/dev/null) || { echo "BUILD FAIL: $f"; exit 1; }
            echo "$out" | grep -q "label overlaps: 0" || { echo "OVERLAP REGRESSION: $f -> $out"; exit 1; }
          done
